<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>초등시험준비</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <header>
      <h1>🌱 초등시험준비</h1>
      <p>원하는 방식으로 학습을 시작하세요</p>
    </header>

    <div class="stats-bar" id="statsBar">
      <div class="stat">
        <div class="stat-value" id="totalQuestions">-</div>
        <div class="stat-label">총 문제</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="bestScore">-</div>
        <div class="stat-label">최고 점수</div>
      </div>
      <div class="stat">
        <div class="stat-value" id="attemptCount">0</div>
        <div class="stat-label">시도 횟수</div>
      </div>
    </div>

    <h2 style="font-size:15px;color:var(--green-700);margin-bottom:12px;font-weight:600;">📖 학습 모드</h2>
    <div class="mode-grid">
      <a href="modes/all.html" class="mode-card">
        <span class="icon">📚</span>
        <h3>전체 학습</h3>
        <p>모든 문제와 정답을<br>한눈에 훑어보기</p>
      </a>
      <a href="modes/flashcard-big.html" class="mode-card">
        <span class="icon">🗂️</span>
        <h3>큰 단위 카드</h3>
        <p>문제 한 개를 통째로<br>카드로 암기</p>
      </a>
      <a href="modes/flashcard.html" class="mode-card">
        <span class="icon">🃏</span>
        <h3>작은 단위 카드</h3>
        <p>소문제 하나씩<br>카드로 암기</p>
      </a>
    </div>

    <h2 style="font-size:15px;color:var(--green-700);margin:24px 0 12px;font-weight:600;">📝 시험 모드</h2>
    <div class="mode-grid">
      <a href="modes/study.html" class="mode-card">
        <span class="icon">✍️</span>
        <h3>문제별 학습</h3>
        <p>1~18번 골라서<br>①②③ 답 입력 연습</p>
      </a>
      <a href="modes/quiz.html" class="mode-card">
        <span class="icon">🎯</span>
        <h3>객관식 시험</h3>
        <p>4지선다 보기 중<br>정답 고르기</p>
      </a>
      <a href="modes/exam.html" class="mode-card">
        <span class="icon">📋</span>
        <h3>최종시험</h3>
        <p>전체 1~18번을<br>실전처럼 한 번에</p>
      </a>
    </div>

    <div class="btn-row">
      <button class="btn btn-ghost" id="resetBtn">기록 초기화</button>
    </div>
  </div>

  <script src="app.js"></script>
  <script>
    (async () => {
      const questions = await loadQuestions();
      document.getElementById('totalQuestions').textContent = questions.length;
      const stats = getStats();
      document.getElementById('bestScore').textContent =
        stats.bestScore !== null ? `${stats.bestScore}%` : '-';
      document.getElementById('attemptCount').textContent = stats.attempts || 0;
    })();

    document.getElementById('resetBtn').addEventListener('click', () => {
      if (confirm('모든 학습 기록을 삭제하시겠습니까?')) {
        localStorage.clear();
        location.reload();
      }
    });
  </script>
</body>
</html>
